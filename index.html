<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weisheit auf Deutsch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>
<script src="grammar-mindmap.js"></script>
<script>
'use strict';

// ================================================================
// DATA LOADER
// ================================================================

/** In-memory cache so each file is fetched at most once */
const cache = {
  books: null,          // { [bookId]: BookMeta }
  chapterIndex: {},     // { [bookId]: ChapterStub[] }
  chapters: {}          // { ['bookId/num']: ChapterData }
};
// Expose to game modules (ES module scope is separate)
window._appCache = cache;

async function fetchJSON(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText} — ${path}`);
  return res.json();
}

async function loadBooks() {
  if (!cache.books) {
    cache.books = await fetchJSON('data/books.json');
  }
  return cache.books;
}

async function loadChapterIndex(bookId) {
  if (!cache.chapterIndex[bookId]) {
    const book = cache.books[bookId];
    cache.chapterIndex[bookId] = await fetchJSON(`${book.dataPath}/index.json`);
  }
  return cache.chapterIndex[bookId];
}

async function loadChapter(bookId, num) {
  const key = `${bookId}/${num}`;
  if (!cache.chapters[key]) {
    const book = cache.books[bookId];
    const file = String(num).padStart(2, '0');
    cache.chapters[key] = await fetchJSON(`${book.dataPath}/ch${file}.json`);
  }
  return cache.chapters[key];
}

// ================================================================
// STATE
// ================================================================
const state = {
  view: 'bookSelect',   // 'bookSelect' | 'chapterMap' | 'lesson' | 'progress'
  currentBook: null,    // bookId string
  currentChapter: null, // chapter number
  currentStep: 0,       // 0=verse 1=grammar 2=exercises
  currentExercise: 0,
  exState: 'question',  // 'question' | 'answered'
  exCorrect: false,
  selectedOption: null,
  progress: {}
};
// Expose to game modules (ES module scope is separate)
window._appState = state;

// ── localStorage ──────────────────────────────────────────────
function loadProgress() {
  try {
    const raw = localStorage.getItem('wad_progress');
    if (raw) state.progress = JSON.parse(raw);
  } catch (e) { console.warn('Could not load progress:', e); }
}
function saveProgress() {
  try { localStorage.setItem('wad_progress', JSON.stringify(state.progress)); }
  catch (e) { console.warn('Could not save progress:', e); }
}
function markDone(bookId, num) {
  if (!state.progress[bookId]) state.progress[bookId] = {};
  state.progress[bookId][num] = { done: true, at: Date.now() };
  saveProgress();
}
function isDone(bookId, num) {
  return !!(state.progress[bookId] && state.progress[bookId][num]);
}
function isUnlocked(bookId, num) {
  if (num === 1) return true;
  return isDone(bookId, num - 1);
}
function doneCount(bookId) {
  return state.progress[bookId] ? Object.keys(state.progress[bookId]).length : 0;
}

// ================================================================
// HELPERS
// ================================================================
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}
function normalize(s) {
  return s.toLowerCase().replace(/[.,!?;:]/g, '').replace(/\s+/g, ' ').trim();
}

// ================================================================
// RENDER HELPERS
// ================================================================
function setHTML(html) {
  document.getElementById('app').innerHTML = html;
}

function showLoading(msg = 'Загрузка…') {
  setHTML(`<div class="loading-wrap">
    <div class="loading-spinner"></div>
    <div class="loading-text">${esc(msg)}</div>
  </div>`);
}

function showError(msg, retryFn) {
  setHTML(`<div class="error-card">
    <div class="error-title">Ошибка загрузки</div>
    <div class="error-msg">${esc(msg)}</div>
    <button class="btn btn-outline" onclick="retryAction()">Попробовать снова</button>
  </div>`);
  window._retryAction = retryFn;
}
window.retryAction = () => window._retryAction && window._retryAction();

// ── Nav bar ───────────────────────────────────────────────────
function navBar(active) {
  const mapDisabled = !state.currentBook;
  return `<nav class="nav-bar">
    <button class="nav-btn${active==='bookSelect'?' active':''}" onclick="goTo('bookSelect')">📚 Книги</button>
    <button class="nav-btn${active==='chapterMap'?' active':''}"
      onclick="${mapDisabled?'':"goTo('chapterMap')"}"
      ${mapDisabled?'disabled':''}>🗺 Главы</button>
    <button class="nav-btn${active==='progress'?' active':''}" onclick="goTo('progress')">📊 Прогресс</button>
  </nav>`;
}

// ================================================================
// VIEWS
// ================================================================

// ── BookSelect ────────────────────────────────────────────────
function renderBookSelect() {
  const books = cache.books;
  const cards = Object.values(books).map(b => {
    const done = doneCount(b.id);
    return `<div class="book-card" onclick="selectBook('${esc(b.id)}')">
      <div class="book-name-he">${esc(b.nameHe)}</div>
      <div class="book-name-ru">${esc(b.name)}</div>
      <div class="book-name-de">${esc(b.nameDe)}</div>
      <div style="margin-top:10px;font-size:.82rem;opacity:.65;">${esc(b.description)}</div>
      <div class="book-meta">${done} / ${b.chaptersCount} глав завершено →</div>
    </div>`;
  }).join('');
  setHTML(`<div>
    ${navBar('bookSelect')}
    <header class="app-header">
      <h1 class="app-title">Weisheit auf Deutsch</h1>
      <p class="app-subtitle">Немецкая грамматика через книги мудрости</p>
    </header>
    ${cards}
  </div>`);
}

// ── ChapterMap ────────────────────────────────────────────────
function renderChapterMap() {
  const book = cache.books[state.currentBook];
  const index = cache.chapterIndex[state.currentBook];
  const done = doneCount(book.id);

  const cells = index.map(stub => {
    const complete = isDone(book.id, stub.number);
    const unlocked = isUnlocked(book.id, stub.number);
    const cls = [complete?'completed':'', !unlocked?'locked':''].filter(Boolean).join(' ');
    return `<div class="chapter-card ${cls}"
      onclick="${unlocked?`startChapter(${stub.number})`:''}"
      title="${esc(stub.theme)}">
      <div class="ch-num">${stub.number}</div>
      <div class="ch-theme">${esc(stub.theme)}</div>
      <div class="ch-check">${complete?'✓':(!unlocked?'🔒':'')}</div>
    </div>`;
  }).join('');

  const hint = done === 0 ? 'Начните с первой главы'
    : `${done} ${plural(done,'глава','главы','глав')} завершено`;

  const hasGamesData = done >= 1;

  setHTML(`<div>
    ${navBar('chapterMap')}
    <div class="map-header">
      <span class="map-title">${esc(book.name)}</span>
      <span class="map-count">${done}/${book.chaptersCount}</span>
    </div>
    <div class="map-hint">${hint}</div>
    <div class="game-strip">
      <button class="game-strip-btn" onclick="openGame('flashcards')" ${hasGamesData?'':'disabled'}>
        <span class="gsb-icon">🃏</span>
        <span class="game-strip-label">Мини-игра</span>
        Флеш-карты
      </button>
      <button class="game-strip-btn" onclick="openGame('chain')" ${hasGamesData?'':'disabled'}>
        <span class="gsb-icon">🔗</span>
        <span class="game-strip-label">Мини-игра</span>
        Цепочка
      </button>
    </div>
    <div class="chapter-grid">${cells}</div>
  </div>`);
}

// ── Lesson ────────────────────────────────────────────────────
function renderLesson() {
  const ch = cache.chapters[`${state.currentBook}/${state.currentChapter}`];
  const stepNames = ['Стих', 'Грамматика', 'Упражнения'];
  const dots = [0,1,2].map(i => {
    const cls = i < state.currentStep ? 'done' : i === state.currentStep ? 'active' : '';
    return `<div class="step-dot ${cls}"></div>`;
  }).join('');

  let content;
  if (state.currentStep === 0) content = renderVerse(ch);
  else if (state.currentStep === 1) content = renderGrammar(ch);
  else content = renderExercises(ch);

  setHTML(`<div>
    <div class="lesson-nav">
      <button class="back-btn" onclick="goTo('chapterMap')">← Назад</button>
      <div class="lesson-meta">
        <div class="lesson-ch-label">Глава ${ch.number}</div>
        <div class="lesson-ch-theme">${esc(ch.theme)}</div>
      </div>
      <div class="step-dots">${dots}</div>
    </div>
    <div class="step-label">${stepNames[state.currentStep]}</div>
    ${content}
  </div>`);
}

function renderVerse(ch) {
  const notice = ch.placeholder
    ? `<div class="placeholder-notice">⚠ Полный текст этой главы находится в разработке.</div>` : '';
  return `<div class="card">
    ${notice}
    <div class="verse-ref">${esc(ch.verse.ref)}</div>
    <div class="verse-he">${esc(ch.verse.he)}</div>
    <div class="verse-ru">${esc(ch.verse.ru)}</div>
    <div class="verse-de">${esc(ch.verse.de)}</div>
    <div class="btn-row"><button class="btn btn-primary" onclick="nextStep()">Далее →</button></div>
  </div>`;
}

function renderGrammar(ch) {
  const g = ch.grammar;
  const notice = ch.placeholder
    ? `<div class="placeholder-notice">⚠ Грамматика этой главы в разработке.</div>` : '';
  return `<div>
    ${notice}
    ${GrammarMindMap.render(g)}
    <div class="btn-row" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="nextStep()">Далее →</button>
    </div>
  </div>`;
}

function renderExercises(ch) {
  const exs = ch.exercises;
  const ex = exs[state.currentExercise];
  const total = exs.length;
  const answered = state.exState === 'answered';
  const isLast = state.currentExercise === total - 1;

  let inputHtml = '';
  if (ex.type === 'classify') {
    inputHtml = `<div class="options-grid">${ex.options.map(opt => {
      let cls = '';
      if (answered) {
        if (opt === ex.answer) cls = 'correct';
        else if (opt === state.selectedOption) cls = 'wrong';
        else cls = 'dim';
      }
      return `<button class="opt-btn ${cls}" data-opt="${esc(opt)}"
        onclick="${answered?'':'pickOpt(this)'}"
        ${answered?'disabled':''}>${esc(opt)}</button>`;
    }).join('')}</div>`;
  } else {
    const inputCls = answered ? (state.exCorrect ? 'correct' : 'wrong') : '';
    inputHtml = `<input type="text" id="ans-input" class="answer-input ${inputCls}"
      placeholder="Ваш ответ…" ${answered?'disabled':''}
      onkeydown="if(event.key==='Enter')checkAnswer()">`;
  }

  let feedback = '';
  if (answered) {
    feedback = state.exCorrect
      ? `<div class="feedback correct">✓ Верно!</div>`
      : `<div class="feedback wrong">✗ Правильный ответ: <strong>${esc(ex.answer)}</strong><br><small>${esc(ex.hint)}</small></div>`;
  }

  const actionBtn = !answered
    ? `<button class="btn btn-gold btn-block" onclick="checkAnswer()">Проверить</button>`
    : isLast
      ? `<button class="btn btn-gold btn-block" onclick="finishChapter()">Завершить главу ✓</button>`
      : `<button class="btn btn-primary btn-block" onclick="nextExercise()">Следующее →</button>`;

  return `<div class="card">
    <div class="ex-progress">Упражнение ${state.currentExercise + 1} / ${total}</div>
    <div class="ex-question">${esc(ex.question)}</div>
    ${inputHtml}
    ${feedback}
    ${actionBtn}
  </div>`;
}

// ── Progress ──────────────────────────────────────────────────
function renderProgress() {
  const books = cache.books;
  let totalDone = 0, totalAll = 0;
  Object.values(books).forEach(b => {
    totalAll += b.chaptersCount;
    totalDone += doneCount(b.id);
  });

  const booksHtml = Object.values(books).map(b => {
    const done = doneCount(b.id);
    const pct = Math.round(done / b.chaptersCount * 100);
    return `<div class="prog-book">
      <div class="prog-book-row">
        <span class="prog-book-name">${esc(b.name)}</span>
        <span class="prog-book-count">${done}/${b.chaptersCount}</span>
      </div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const resetBtn = totalDone > 0
    ? `<button class="btn btn-outline" onclick="resetProgress()" style="margin-top:8px;">Сбросить прогресс</button>` : '';

  setHTML(`<div>
    ${navBar('progress')}
    <h2 style="font-family:'Playfair Display',serif;font-size:1.75rem;margin:20px 0 0;">Мой прогресс</h2>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${totalDone}</div><div class="stat-lbl">Глав завершено</div></div>
      <div class="stat-card"><div class="stat-num">${totalAll - totalDone}</div><div class="stat-lbl">Глав осталось</div></div>
    </div>
    ${booksHtml}
    ${resetBtn}
  </div>`);
}

// ================================================================
// ACTIONS
// ================================================================

async function goTo(view) {
  state.view = view;
  window.scrollTo(0, 0);
  try {
    if (view === 'bookSelect') {
      if (!cache.books) { showLoading(); await loadBooks(); }
      renderBookSelect();
    } else if (view === 'chapterMap') {
      if (!cache.chapterIndex[state.currentBook]) {
        showLoading('Загрузка глав…');
        await loadChapterIndex(state.currentBook);
      }
      renderChapterMap();
    } else if (view === 'lesson') {
      renderLesson();
    } else if (view === 'progress') {
      if (!cache.books) { showLoading(); await loadBooks(); }
      renderProgress();
    }
  } catch (err) {
    showError(err.message, () => goTo(view));
  }
}

async function selectBook(id) {
  state.currentBook = id;
  try {
    showLoading('Загрузка глав…');
    await loadChapterIndex(id);
    renderChapterMap();
    window.scrollTo(0, 0);
  } catch (err) {
    showError(err.message, () => selectBook(id));
  }
}

async function startChapter(num) {
  state.currentChapter = num;
  state.currentStep = 0;
  state.currentExercise = 0;
  state.exState = 'question';
  state.exCorrect = false;
  state.selectedOption = null;
  try {
    showLoading('Загрузка урока…');
    await loadChapter(state.currentBook, num);
    state.view = 'lesson';
    renderLesson();
    window.scrollTo(0, 0);
  } catch (err) {
    showError(err.message, () => startChapter(num));
  }
}

function nextStep() {
  state.currentStep++;
  state.currentExercise = 0;
  state.exState = 'question';
  state.exCorrect = false;
  state.selectedOption = null;
  renderLesson();
  window.scrollTo(0, 0);
}

function toggleExample(idx) {
  const el = document.getElementById(`ex-${idx}`);
  if (el) el.classList.toggle('revealed');
}

function pickOpt(el) { chooseOption(el.dataset.opt); }
function chooseOption(opt) {
  if (state.exState === 'answered') return;
  state.selectedOption = opt;
  const ch = cache.chapters[`${state.currentBook}/${state.currentChapter}`];
  const ex = ch.exercises[state.currentExercise];
  state.exCorrect = opt === ex.answer;
  state.exState = 'answered';
  renderLesson();
}

function checkAnswer() {
  if (state.exState === 'answered') return;
  const ch = cache.chapters[`${state.currentBook}/${state.currentChapter}`];
  const ex = ch.exercises[state.currentExercise];
  if (ex.type === 'classify') return;
  const input = document.getElementById('ans-input');
  if (!input || !input.value.trim()) return;
  state.exCorrect = ex.answer === '*'
    ? true
    : normalize(input.value.trim()) === normalize(ex.answer);
  state.exState = 'answered';
  renderLesson();
  window.scrollTo(0, 0);
}

function nextExercise() {
  state.currentExercise++;
  state.exState = 'question';
  state.exCorrect = false;
  state.selectedOption = null;
  renderLesson();
  window.scrollTo(0, 0);
}

function finishChapter() {
  markDone(state.currentBook, state.currentChapter);
  const book = cache.books[state.currentBook];
  const ch = cache.chapters[`${state.currentBook}/${state.currentChapter}`];
  const nextNum = state.currentChapter + 1;
  const hasNext = nextNum <= book.chaptersCount;
  setHTML(`<div class="completion-wrap">
    <div class="completion-card">
      <div class="completion-icon">⭐</div>
      <h2 class="completion-title">Глава ${ch.number} завершена!</h2>
      <p class="completion-text">${esc(ch.theme)}</p>
      <div class="completion-btns">
        ${hasNext
          ? `<button class="btn btn-gold" onclick="startChapter(${nextNum})">Следующая глава →</button>`
          : `<button class="btn btn-gold" onclick="goTo('progress')">Посмотреть прогресс</button>`}
        <button class="btn btn-outline" onclick="goTo('chapterMap')">К списку глав</button>
      </div>
    </div>
  </div>`);
  window.scrollTo(0, 0);
}

function resetProgress() {
  if (!confirm('Вы уверены? Весь прогресс будет удалён.')) return;
  state.progress = {};
  saveProgress();
  renderProgress();
}

// ================================================================
// INIT
// ================================================================
loadProgress();
goTo('bookSelect');
</script>

<!--
  Game modules are ES modules loaded dynamically on demand.
  They are decoupled from the main script above.
-->
<script type="module">
  import { startFlashcards } from './games/flashcards.js';
  import { startChain }      from './games/chain.js';

  /**
   * Collects all chapter data objects that have been loaded into cache
   * (i.e. chapters the player has actually opened).
   * For games we only need chapters whose JSON is already in cache —
   * no extra network requests.
   */
  function getLoadedChapters() {
    const bookId = window._appState?.currentBook;
    if (!bookId) return [];
    return Object.entries(window._appCache?.chapters ?? {})
      .filter(([k]) => k.startsWith(bookId + '/'))
      .map(([, ch]) => ch);
  }

  /**
   * Opens a full-screen game overlay and starts the requested game.
   * @param {'flashcards'|'chain'} type
   */
  window.openGame = function openGame(type) {
    const chapters = getLoadedChapters();

    // Create overlay
    const overlay = document.createElement('div');
    overlay.className = 'game-overlay';
    overlay.innerHTML = '<div class="game-overlay-inner"></div>';
    document.body.appendChild(overlay);

    const inner = overlay.querySelector('.game-overlay-inner');

    const close = () => overlay.remove();

    if (type === 'flashcards') {
      startFlashcards(inner, chapters, { onClose: close });
    } else if (type === 'chain') {
      startChain(inner, chapters, { onClose: close });
    }
  };
</script>
</body>
</html>
